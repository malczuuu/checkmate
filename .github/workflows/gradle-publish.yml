name: Gradle Publish

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"    # pattern for v1.2.3
      - "v[0-9]*.[0-9]*.[0-9]*-*"  # pattern for v1.2.3-suffix

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-disabled: true

      # Not using cache from setup-gradle for now due to license change.
      # See: https://blog.gradle.org/github-actions-for-gradle-v6
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-publish-${{ runner.os }}-java-25-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-publish-${{ runner.os }}-java-25-

      - name: Publish to GitHub Packages
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.configuration-cache=false
            -Dorg.gradle.daemon=false
            -Dorg.gradle.parallel=false
            -Dorg.gradle.workers.max=1
          GPR_USER: ${{ secrets.GPR_USER }}
          GPR_TOKEN: ${{ secrets.GPR_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"  # removes leading 'v' from tag name
          echo "::notice::publishing version $VERSION"
          ./gradlew -Pversion="$VERSION" publish
